<!DOCTYPE html>
<html>
<head>
<title>Checkout - Craft Collection</title>

<style>

body{
font-family:Arial,sans-serif;
background:#fff0f5;
margin:0;
padding:20px;
}

.checkout-box{
background:white;
max-width:500px;
margin:auto;
padding:30px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#ff4d88;
}

input,textarea{
width:100%;
padding:15px;
margin:10px 0;
border:2px solid #ffd6e7;
border-radius:15px;
outline:none;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#25D366;
color:white;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

button:hover{
transform:scale(1.03);
}


/* Success Popup Animation */

#successPopup{
animation:popupZoom 0.5s ease;
}

@keyframes popupZoom{
0%{
transform:translate(-50%,-50%) scale(0.5);
opacity:0;
}

100%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
}

.confetti{
font-size:30px;
margin-top:15px;
animation:confettiMove 1s infinite alternate;
}

@keyframes confettiMove{
from{
transform:translateY(0);
}

to{
transform:translateY(-10px);
}
}

</style>
</head>

<body>

<div class="checkout-box">

<h1>💗 Checkout</h1>

<div id="orderSummary"
style="
background:#fff0f5;
padding:20px;
border-radius:20px;
margin:20px 0;
">
</div>

<input type="text"
id="name"
placeholder="Enter Name">

<input type="text"
id="phone"
placeholder="Phone Number">

<textarea
id="address"
placeholder="Enter Address">
</textarea>

<button onclick="placeOrder()">
Order on WhatsApp
</button>

<div id="successPopup"
style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
z-index:9999;
">

<h2 style="color:#ff4d88;">
💗 Order Success
</h2>

<p>
Your order placed successfully 😍
</p>

<button onclick="closePopup()">
OK
</button>

<div class="confetti">
🎉 🎊 💗 ✨ 🎁
</div>

</div>

</div>

<script>

function placeOrder(){

let name =
document.getElementById(
"name"
).value;

let phone =
document.getElementById(
"phone"
).value;

let address =
document.getElementById(
"address"
).value;

let cartItems =
JSON.parse(
localStorage.getItem(
"cartItems"
)
) || [];

let total = 0;

let products = "";

cartItems.forEach(item => {

products +=
"🛒 " +
item.name +
" - ₹" +
item.price +
"%0A";

total +=
parseInt(item.price);

});

let message =

"💗 New Order %0A%0A" +

"👤 Name: " +
name + "%0A" +

"📞 Phone: " +
phone + "%0A" +

"🏠 Address: " +
address + "%0A%0A" +

"🛍 Products:%0A" +
products + "%0A" +

"💰 Total: ₹" +
total;

window.open(
"https://wa.me/919747508329?text=" +
message
);

document.getElementById(
"successPopup"
).style.display =
"block";

}

/* Show Cart Items */

let cartItems =
JSON.parse(
localStorage.getItem(
"cartItems"
)
) || [];

let total = 0;

let html = "<h3>🛒 Your Order</h3>";

cartItems.forEach(item => {

total +=
parseInt(item.price);

html +=
`
<p>
${item.name}
- ₹${item.price}
</p>
`;

});

html +=
`
<h2>
Total: ₹${total}
</h2>
`;

document.getElementById(
"orderSummary"
).innerHTML =
html;

function closePopup(){

document.getElementById(
"successPopup"
).style.display =
"none";

}
</script>

</body>
</html>
